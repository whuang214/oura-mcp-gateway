name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run mypy

      - name: Test
        run: uv run pytest --cov=oura_mcp --cov-report=term-missing

  package:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build distributions
        run: uv build

      - name: Audit distribution privacy
        run: uv run python scripts/audit_distribution.py dist/*

      - name: Install and import wheel
        shell: bash
        run: |
          uv venv .package-smoke --python 3.14
          uv pip install --python .package-smoke/bin/python dist/*.whl
          .package-smoke/bin/python -c "import importlib.metadata as m; import oura_mcp; assert m.version('oura-mcp') == oura_mcp.__version__"
