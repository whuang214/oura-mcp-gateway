interface:
  display_name: "Oura Sync"
  short_description: "Sync Oura metrics into a configured Sheet"
  default_prompt: "Use $oura-sync to sync my recent Oura data into my configured Google Sheet."

dependencies:
  tools:
    - type: "mcp"
      value: "oura"
      description: "Local read-only Oura retrieval and normalization server"
      transport: "stdio"
